name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to droplet
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: /opt/lfg-bot/deploy.sh
